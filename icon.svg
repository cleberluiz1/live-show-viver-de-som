<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <!-- Fundo escuro com bordas arredondadas -->
    <rect width="512" height="512" rx="100" fill="#0a0a0a"/>
    
    <!-- Triângulo Play MAIOR com cantos arredondados -->
    <path d="M140,70 
             Q140,55 155,55 
             L440,230 
             Q460,242 460,256 
             Q460,270 440,282 
             L155,457 
             Q140,457 140,442 
             Z" 
